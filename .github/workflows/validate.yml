name: "Test & validate"

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test & lint
    container: rust:latest
    env:
      GOODREADS_API_KEY: ${{ secrets.GOODREADS_API_KEY }}
      GOODREADS_SECRET: ${{ secrets.GOODREADS_SECRET }}
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add clippy
      - run: cargo clippy
      - run: cargo test

  validate:
    runs-on: ubuntu-latest
    name: Validate
    container: ruby:3.3
    env:
      BUNDLE_FROZEN: true
      BUNDLE_WITHOUT: development
    steps:
      - uses: actions/checkout@v6
      - run: bundle install --frozen
      - run: bundle exec rubocop
      - run: bundle exec ./validate.rb --disable-external

  build:
    runs-on: ubuntu-latest
    name: Build containers
    env:
      DOCKER_CACHE: type=registry,ref=ghcr.io/${{ github.repository }}:cache
      PUSH_CACHE: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          push: false
          cache-from: ${{ env.DOCKER_CACHE }}
          cache-to: ${{ env.PUSH_CACHE == 'true' && format('{0},mode=max', env.DOCKER_CACHE) || '' }}
          target: builder
